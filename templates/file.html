{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl w-full mx-auto animate__animated animate__fadeInUp">
    
    <a href="/" class="inline-flex items-center gap-2 text-sm text-slate-400 hover:text-white mb-6 group transition-colors">
        <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
        Back to Main Menu
    </a>

    <div class="glass-panel rounded-3xl p-6 md:p-8 shadow-2xl">
        <div class="flex items-center gap-3 mb-6 pb-4 border-b border-white/5">
            <div class="p-2.5 bg-purple-500/10 text-purple-400 rounded-xl">
                <i data-lucide="folder" class="w-5 h-5"></i>
            </div>
            <div>
                <h2 class="text-xl font-bold text-white">Binary File Processor</h2>
                <p class="text-xs text-slate-400">Stream safe local file encryption conversions</p>
            </div>
        </div>

        <div id="fileSuccessMsg" class="hidden mb-6 p-4 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-xl text-sm items-center gap-3 animate__animated animate__fadeIn">
            <i data-lucide="check-circle" class="w-5 h-5 shrink-0"></i>
            <span id="fileSuccessText">File successfully loaded into local cache.</span>
        </div>

        {% if error %}
        <div class="mb-6 p-4 bg-rose-500/10 border border-rose-500/20 text-rose-400 rounded-xl text-sm flex items-center gap-3 animate__animated animate__headShake">
            <i data-lucide="alert-circle" class="w-5 h-5 shrink-0"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Secret Passphrase Key</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500">
                        <i data-lucide="key" class="w-4 h-4"></i>
                    </span>
                    <input type="password" name="password" required placeholder="Enter strong operational key..." 
                           class="w-full pl-10 pr-4 py-3 bg-slate-900/60 border border-white/10 rounded-xl text-white focus:outline-none focus:border-purple-500 transition-colors text-sm">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Target Local File</label>
                <label class="group relative flex flex-col items-center justify-center w-full h-44 border-2 border-dashed border-white/10 hover:border-purple-500/50 rounded-2xl cursor-pointer bg-slate-900/40 hover:bg-slate-900/60 transition-all overflow-hidden">
                    <input type="file" name="file_input" id="file_input" class="hidden" onchange="updateFileInfo()">
                    
                    <div class="text-center space-y-2 pointer-events-none z-10 p-4">
                        <div id="fileIconContainer" class="inline-flex p-3 bg-white/5 rounded-xl text-slate-400 group-hover:scale-110 group-hover:bg-purple-500/10 group-hover:text-purple-400 transition-all duration-300">
                            <i data-lucide="upload-cloud" id="uploadIcon" class="w-6 h-6"></i>
                        </div>
                        <p class="text-sm font-medium text-slate-300" id="file_name_display">Click to browse or drop file here</p>
                        <p class="text-xs text-slate-500" id="file_size_display">Supported up to 50MB file sizing bounds</p>
                    </div>
                </label>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-2">
                <button type="submit" name="action" value="encrypt" 
                        class="flex items-center justify-center gap-2 py-3 bg-purple-600 hover:bg-purple-500 active:scale-[0.98] transition-all rounded-xl text-sm font-semibold shadow-lg text-white">
                    <i data-lucide="shield" class="w-4 h-4"></i> Lock (.opcu)
                </button>
                <button type="submit" name="action" value="decrypt" 
                        class="flex items-center justify-center gap-2 py-3 bg-slate-800 hover:bg-slate-700 active:scale-[0.98] transition-all border border-white/5 rounded-xl text-sm font-semibold text-white">
                    <i data-lucide="shield-off" class="w-4 h-4"></i> Unlock File
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function updateFileInfo() {
        const input = document.getElementById('file_input');
        const display = document.getElementById('file_name_display');
        const sizeDisplay = document.getElementById('file_size_display');
        const container = document.getElementById('fileIconContainer');
        const icon = document.getElementById('uploadIcon');
        
        // Alert elements
        const successBanner = document.getElementById('fileSuccessMsg');
        const successText = document.getElementById('fileSuccessText');
        
        if (input.files && input.files.length > 0) {
            let activeFile = input.files[0];
            
            // Format layout names & size bounds
            display.innerText = activeFile.name;
            display.classList.add('text-purple-400', 'font-mono');
            let sizeInMB = (activeFile.size / (1024 * 1024)).toFixed(2);
            sizeDisplay.innerText = `Size: ${sizeInMB} MB`;
            
            // Transform dropzone context graphic icons
            container.classList.remove('bg-white/5', 'text-slate-400');
            container.classList.add('bg-purple-500/20', 'text-purple-400');
            icon.setAttribute('data-lucide', 'file-check');
            
            // Unhide the live dynamic status alert notification banner
            successText.innerText = `📥 Staged successfully: "${activeFile.name}" (${sizeInMB} MB) is ready for processing.`;
            successBanner.classList.remove('hidden');
            successBanner.classList.add('flex');
            
            lucide.createIcons();
        }
    }
</script>
{% endblock %}
